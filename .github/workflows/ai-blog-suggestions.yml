name: AI Blog Improvement Radar

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    concurrency:
      group: blog-suggestions
      cancel-in-progress: false

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.4.0
        with:
          version: 9

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install OpenCode
        run: npm install -g @earendil-works/pi-coding-agent@0.75.5 pi-multiagent@0.9.4 pi-gh-cli@0.2.4 pi-lens@3.8.45

      - name: Configure git
        run: |
          git config --global user.name "pi[bot]"
          git config --global user.email "pi[bot]@users.noreply.github.com"

      - name: Setup OpenCode permissions
        run: |
          mkdir -p .pi/extensions/pi-permission-system
          echo '{"yoloMode": true}' > .pi/extensions/pi-permission-system/config.json

      - name: Ensure blog-radar label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create blog-radar \
            --color '00675d' \
            --description 'Monthly blog improvement suggestions' \
            2>/dev/null || true

      - name: Run blog improvement radar
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/ai-blog-suggestions.sh
