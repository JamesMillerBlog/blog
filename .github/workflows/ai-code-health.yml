name: Weekly Coding Standards Audit

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      quick_mode:
        description: "Skip AI deep review (faster)"
        type: boolean
        default: false
        required: false

permissions: read-all

jobs:
  code-health:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Run code health check
        env:
          CI: 'true'
          GH_TOKEN: ${{ github.token }}
          QUICK_MODE: ${{ github.event.inputs.quick_mode }}
        run: |
          if [ "$QUICK_MODE" = 'true' ]; then
            ./scripts/code-health-check.sh --ci --quick
          else
            ./scripts/code-health-check.sh --ci
          fi
