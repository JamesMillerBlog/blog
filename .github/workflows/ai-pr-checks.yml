name: AI PR Checks

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ai-pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: write
      contents: read
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    outputs:
      passed: ${{ steps.run_checks.outputs.passed }}
      failures: ${{ steps.run_checks.outputs.failures }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.4.0
        with:
          version: 9

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install shellcheck
        run: sudo apt-get install -y -qq shellcheck

      - name: Create placeholder post for build
        run: |
          mkdir -p web/_posts
          printf -- '---\ntitle: CI Placeholder\ndate: "2024-01-01"\ncoverImage: /placeholder.jpg\nauthor:\n  name: CI\n  picture: /placeholder.jpg\nexcerpt: Placeholder post for CI builds.\nogImage:\n  url: /placeholder.jpg\n---\nPlaceholder.\n' \
            > web/_posts/ci-placeholder.mdx

      - name: Run criteria checks
        id: run_checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          bash scripts/ai-criteria-check.sh 2>&1
          EXIT_CODE=$?
          set -e
          if [[ $EXIT_CODE -eq 0 ]]; then
            echo 'passed=true' >> "$GITHUB_OUTPUT"
            echo 'failures=' >> "$GITHUB_OUTPUT"
          else
            FAILURES_JSON=$(cat /tmp/checks-failures.json 2>/dev/null || echo '[]')
            SUMMARY=$(printf '%s' "$FAILURES_JSON" | \
              jq -r '.[] | "- \(.type): \(.message)"' 2>/dev/null || \
              echo 'Check output unavailable')
            echo 'passed=false' >> "$GITHUB_OUTPUT"
            # Pass structured JSON as failures payload for the fix script
            EOF_DELIM="FAILURES_EOF_$(openssl rand -hex 8)"
            echo "failures<<${EOF_DELIM}" >> "$GITHUB_OUTPUT"
            printf '%s' "$FAILURES_JSON" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "${EOF_DELIM}" >> "$GITHUB_OUTPUT"
            COMMENT_RESP=$(printf '⚠️ **CI checks failed.** Auto-fix running...\n\n%s' "${SUMMARY}" | \
              gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                --method POST --field body=@- 2>/dev/null || true)
            FAILURE_COMMENT_ID=$(printf '%s' "${COMMENT_RESP}" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)
            if [[ -n "${FAILURE_COMMENT_ID}" && "${FAILURE_COMMENT_ID}" =~ ^[0-9]+$ ]]; then
              echo "failure_comment_id=${FAILURE_COMMENT_ID}" >> "$GITHUB_OUTPUT"
              gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${FAILURE_COMMENT_ID}/reactions" \
                --method POST --field content='eyes' 2>/dev/null || true
            fi
          fi

      - name: Check fix iteration count
        if: steps.run_checks.outputs.passed == 'false'
        id: iter_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ITER_COUNT=$(gh pr view "${PR_NUMBER}" --json labels \
            --jq '[.labels[].name | select(startswith("ai-checks-iter-"))] | length' \
            2>/dev/null || echo '0')
          echo "iter_count=${ITER_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Dispatch fix workflow
        if: >-
          steps.run_checks.outputs.passed == 'false' &&
          steps.iter_check.outputs.iter_count < 3
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          ITER_COUNT: ${{ steps.iter_check.outputs.iter_count }}
          FAILURES: ${{ steps.run_checks.outputs.failures }}
          FAILURE_COMMENT_ID: ${{ steps.run_checks.outputs.failure_comment_id }}
        run: |
          NEXT_ITER=$(( ITER_COUNT + 1 ))
          jq -n \
            --arg ref "${PR_HEAD_REF}" \
            --arg pr_number "${PR_NUMBER}" \
            --arg branch "${PR_HEAD_REF}" \
            --arg fix_iter "${NEXT_ITER}" \
            --arg failures "${FAILURES}" \
            --arg failure_comment_id "${FAILURE_COMMENT_ID}" \
            '{ref: $ref, inputs: {pr_number: $pr_number, branch: $branch, fix_iter: $fix_iter, failures: $failures, failure_comment_id: $failure_comment_id}}' | \
            gh api "repos/${REPO}/actions/workflows/ai-pr-checks-respond.yml/dispatches" \
              --method POST --input -

      - name: Label PR — needs human after max iterations
        if: >-
          steps.run_checks.outputs.passed == 'false' &&
          steps.iter_check.outputs.iter_count >= 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create 'ai-checks-needs-human' \
            --color 'b60205' \
            --description 'CI checks failed and could not be auto-fixed' \
            2>/dev/null || true
          gh pr edit "${PR_NUMBER}" --add-label 'ai-checks-needs-human'
          gh pr comment "${PR_NUMBER}" \
            --body '🚨 **CI checks still failing after 3 fix attempts.** Manual intervention required.' || true
