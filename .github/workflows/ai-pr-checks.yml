name: AI PR Checks

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ai-pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: write
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    outputs:
      passed: ${{ steps.run_checks.outputs.passed }}
      failures: ${{ steps.run_checks.outputs.failures }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: 9

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Run criteria checks
        id: run_checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          OUTPUT=$(bash scripts/ai-criteria-check.sh 2>&1)
          EXIT_CODE=$?
          set -e
          if [[ $EXIT_CODE -eq 0 ]]; then
            echo 'passed=true' >> "$GITHUB_OUTPUT"
            echo 'failures=' >> "$GITHUB_OUTPUT"
            gh pr comment "${PR_NUMBER}" \
              --body '✅ **CI checks passed.**' || true
          else
            SAFE_OUTPUT=$(printf '%s' "$OUTPUT" | head -c 4000)
            echo 'passed=false' >> "$GITHUB_OUTPUT"
            # Use delimiter to safely capture multiline output
            EOF_DELIM="FAILURES_EOF_$(openssl rand -hex 8)"
            echo "failures<<${EOF_DELIM}" >> "$GITHUB_OUTPUT"
            echo "${SAFE_OUTPUT}" >> "$GITHUB_OUTPUT"
            echo "${EOF_DELIM}" >> "$GITHUB_OUTPUT"
            printf '⚠️ **CI checks failed.** Auto-fix running...\n\n```\n%s\n```' "${SAFE_OUTPUT}" | \
              gh pr comment "${PR_NUMBER}" --body-file - || true
          fi

      - name: Check fix iteration count
        if: steps.run_checks.outputs.passed == 'false'
        id: iter_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ITER_COUNT=$(gh pr view "${PR_NUMBER}" --json labels \
            --jq '[.labels[].name | select(startswith("ai-checks-iter-"))] | length' \
            2>/dev/null || echo '0')
          echo "iter_count=${ITER_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Dispatch fix workflow
        if: >-
          steps.run_checks.outputs.passed == 'false' &&
          steps.iter_check.outputs.iter_count < 3
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          ITER_COUNT: ${{ steps.iter_check.outputs.iter_count }}
          FAILURES: ${{ steps.run_checks.outputs.failures }}
        run: |
          NEXT_ITER=$(( ITER_COUNT + 1 ))
          jq -n \
            --arg ref "${PR_HEAD_REF}" \
            --arg pr_number "${PR_NUMBER}" \
            --arg branch "${PR_HEAD_REF}" \
            --arg fix_iter "${NEXT_ITER}" \
            --arg failures "${FAILURES}" \
            '{ref: $ref, inputs: {pr_number: $pr_number, branch: $branch, fix_iter: $fix_iter, failures: $failures}}' | \
            gh api "repos/${REPO}/actions/workflows/ai-pr-checks-respond.yml/dispatches" \
              --method POST --input -

      - name: Label PR — needs human after max iterations
        if: >-
          steps.run_checks.outputs.passed == 'false' &&
          steps.iter_check.outputs.iter_count >= 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create 'ai-checks-needs-human' \
            --color 'b60205' \
            --description 'CI checks failed and could not be auto-fixed' \
            2>/dev/null || true
          gh pr edit "${PR_NUMBER}" --add-label 'ai-checks-needs-human'
          gh pr comment "${PR_NUMBER}" \
            --body '🚨 **CI checks still failing after 3 fix attempts.** Manual intervention required.' || true
