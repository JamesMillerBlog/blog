name: AI PR Generate

on:
  pull_request:
    types: [opened]

jobs:
  generate:
    # Skip PRs opened by bots — they already have AI-generated descriptions
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.4.0
        with:
          version: 9

      - name: Install OpenCode
        run: npm install -g @earendil-works/pi-coding-agent@0.75.5 pi-multiagent@0.9.4 pi-gh-cli@0.2.4 pi-lens@3.8.45

      - name: Generate PR description
        env:
          CI: 'true'
          GH_TOKEN: ${{ secrets.PR_CREATE_TOKEN || github.token }}
          GH_PR_CREATE_TOKEN: ${{ secrets.PR_CREATE_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}/3..."
            if ./scripts/generate-pr.sh; then
              break
            elif [ "${attempt}" -lt 3 ]; then
              delay=$((attempt * 30))
              echo "Attempt ${attempt} failed, waiting ${delay}s before retry..."
              sleep "${delay}"
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Post commands reference
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '%s\n' \
            '---' \
            '### AI Commands' \
            '' \
            'Use these in PR comments to interact with AI:' \
            '' \
            '| Command | What it does |' \
            '|---|---|' \
            '| `@ai <instruction>` | Ask AI to apply a fix or make a change |' \
            '| `@council <question>` | Ask the agent council for analysis or a second opinion |' \
            '| `@review` | Trigger an AI code review |' \
            '| `/resume` | Redeploy the preview environment without code changes |' \
            '| `/rate <value>` | Submit a quality rating for this PR |' \
            > /tmp/commands.md
          gh pr comment "${PR_NUMBER}" --body-file /tmp/commands.md
