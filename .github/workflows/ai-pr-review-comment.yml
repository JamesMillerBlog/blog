name: AI PR Review Comment — Assess

on:
  pull_request_review_comment:
    types: [created]

jobs:
  assess:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: ai-pr-review-comment-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    permissions:
      contents: read
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Acknowledge comment
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/pulls/comments/${COMMENT_ID}/reactions \
            -f content=eyes || true

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: 9

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install OpenCode
        run: npm install -g @earendil-works/pi-coding-agent@0.75.5 pi-multiagent@0.9.4 pi-gh-cli@0.2.4 pi-lens@3.8.45

      - name: Run assessment
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          FILE_PATH: ${{ github.event.comment.path }}
          DIFF_HUNK: ${{ github.event.comment.diff_hunk }}
          COMMENT_LINE: ${{ github.event.comment.line }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: bash scripts/ai-pr-review-comment-assess.sh
