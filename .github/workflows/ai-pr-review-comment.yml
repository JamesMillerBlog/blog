name: AI PR Review Comment — Assess

on:
  pull_request_review_comment:
    types: [created]

jobs:
  assess:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 60

    concurrency:
      group: ai-pr-review-comment-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      COMMENT_BODY: ${{ github.event.comment.body }}

    steps:
      - name: Acknowledge comment
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/pulls/comments/${COMMENT_ID}/reactions \
            -f content=eyes || true

      - name: Validate branch name
        id: validate_branch
        env:
          RAW_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ ! "${RAW_BRANCH}" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
            echo "Unsafe branch name: ${RAW_BRANCH}" >&2
            exit 1
          fi
          echo "branch=${RAW_BRANCH}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.validate_branch.outputs.branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: 9

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install OpenCode
        run: npm install -g @earendil-works/pi-coding-agent@0.75.5 pi-multiagent@0.9.4 pi-gh-cli@0.2.4 pi-lens@3.8.45

      - name: Configure git
        run: |
          git config --global user.name 'pi[bot]'
          git config --global user.email 'pi[bot]@users.noreply.github.com'

      - name: Setup OpenCode permissions
        run: |
          mkdir -p .pi/extensions/pi-permission-system
          echo '{"yoloMode": true}' > .pi/extensions/pi-permission-system/config.json

      - name: Classify comment
        id: classify
        env:
          RAW_COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [[ "${RAW_COMMENT_BODY}" == /ai\ * ]]; then
            echo 'mode=fix' >> "$GITHUB_OUTPUT"
          else
            echo 'mode=assess' >> "$GITHUB_OUTPUT"
          fi

      - name: Post working indicator (fix mode)
        if: steps.classify.outputs.mode == 'fix'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          INSTRUCTION="${COMMENT_BODY#/ai }"
          REPLY_BODY="**Working on it...**

> ${INSTRUCTION}

[View Actions run](${RUN_URL})"
          gh api "repos/${{ github.repository }}/pulls/comments/${COMMENT_ID}/replies" \
            --method POST --field body="${REPLY_BODY}" 2>/dev/null || \
          gh pr comment "${PR_NUMBER}" --body "${REPLY_BODY}" || true

      - name: Run AI fix
        if: steps.classify.outputs.mode == 'fix'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          VALIDATED_BRANCH: ${{ steps.validate_branch.outputs.branch }}
        run: |
          INSTRUCTION="${COMMENT_BODY#/ai }"
          bash scripts/ai-respond.sh "${PR_NUMBER}" "${VALIDATED_BRANCH}" "${INSTRUCTION}"

      - name: Push fixes
        if: steps.classify.outputs.mode == 'fix'
        env:
          VALIDATED_BRANCH: ${{ steps.validate_branch.outputs.branch }}
        run: git push origin "${VALIDATED_BRANCH}"

      - name: Post fix result
        if: steps.classify.outputs.mode == 'fix'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          if [[ -f /tmp/ai-respond-result.md ]]; then
            RESULT_BODY="$(cat /tmp/ai-respond-result.md)"
            gh api "repos/${{ github.repository }}/pulls/comments/${COMMENT_ID}/replies" \
              --method POST --field body="${RESULT_BODY}" 2>/dev/null || \
            gh pr comment "${PR_NUMBER}" --body "${RESULT_BODY}" || true
          fi

      - name: Sanitize attacker-controlled inputs (assess mode)
        id: sanitize
        if: steps.classify.outputs.mode == 'assess'
        # COMMENT_BODY/DIFF_HUNK/FILE_PATH come from PR author — truncate to limit prompt-injection
        # surface. Trust boundary: workflow only fires for repo-owner comments (checked above).
        env:
          RAW_COMMENT_BODY: ${{ github.event.comment.body }}
          RAW_DIFF_HUNK: ${{ github.event.comment.diff_hunk }}
          RAW_FILE_PATH: ${{ github.event.comment.path }}
        run: |
          COMMENT_BODY=$(printf '%s' "${RAW_COMMENT_BODY}" | head -c 4000)
          DIFF_HUNK=$(printf '%s' "${RAW_DIFF_HUNK}" | head -c 2000)
          FILE_PATH=$(printf '%s' "${RAW_FILE_PATH}" | head -c 500 | tr -cd 'a-zA-Z0-9/._-')
          echo "comment_body<<SANITIZE_EOF" >> "$GITHUB_OUTPUT"
          echo "${COMMENT_BODY}" >> "$GITHUB_OUTPUT"
          echo "SANITIZE_EOF" >> "$GITHUB_OUTPUT"
          echo "diff_hunk<<SANITIZE_EOF" >> "$GITHUB_OUTPUT"
          echo "${DIFF_HUNK}" >> "$GITHUB_OUTPUT"
          echo "SANITIZE_EOF" >> "$GITHUB_OUTPUT"
          echo "file_path=${FILE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Run assessment
        if: steps.classify.outputs.mode == 'assess'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_BODY: ${{ steps.sanitize.outputs.comment_body }}
          FILE_PATH: ${{ steps.sanitize.outputs.file_path }}
          DIFF_HUNK: ${{ steps.sanitize.outputs.diff_hunk }}
          COMMENT_LINE: ${{ github.event.comment.line }}
          BRANCH: ${{ steps.validate_branch.outputs.branch }}
        run: bash scripts/ai-pr-review-comment-assess.sh
