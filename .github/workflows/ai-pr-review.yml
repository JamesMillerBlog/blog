name: AI PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        type: string
      branch:
        required: true
        type: string

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       !(github.event.action == 'synchronize' && github.actor == 'pi[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      actions: write  # needed to dispatch ai-pr-review-respond.yml; accepted risk — workflow only runs for same-repo PRs from owner
      contents: read
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

    steps:
      - name: Post reviewing indicator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${PR_NUMBER}" \
            --repo '${{ github.repository }}' \
            --body '👀 AI review running...' || true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.branch }}
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.4.0
        with:
          version: 9

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install OpenCode
        run: npm install -g @earendil-works/pi-coding-agent@0.75.5 pi-multiagent@0.9.4 pi-gh-cli@0.2.4 pi-lens@3.8.45

      - name: Run AI review
        id: review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GH_PR_CREATE_TOKEN: ${{ secrets.PR_CREATE_TOKEN }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        # Run script from base branch so PR code changes cannot affect the review runner
        run: git show origin/main:scripts/ai-pr-review-run.sh | bash

      - name: Check fix iteration count
        if: steps.review.outputs.high_count != '0' || steps.review.outputs.critical_count != '0'
        id: iter_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ITER_COUNT=$(gh pr view "${PR_NUMBER}" --json labels \
            --jq '[.labels[].name | select(startswith("ai-fix-iter-"))] | length' \
            2>/dev/null || echo '0')
          echo "iter_count=${ITER_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Dispatch fix workflow
        if: >-
          (steps.review.outputs.high_count != '0' || steps.review.outputs.critical_count != '0') &&
          steps.iter_check.outputs.iter_count < 3
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref || github.event.inputs.branch }}
          ITER_COUNT: ${{ steps.iter_check.outputs.iter_count }}
        run: |
          NEXT_ITER=$(( ITER_COUNT + 1 ))
          jq -n \
            --arg ref "${PR_HEAD_REF}" \
            --arg pr_number "${PR_NUMBER}" \
            --arg branch "${PR_HEAD_REF}" \
            --arg fix_iter "${NEXT_ITER}" \
            '{ref: $ref, inputs: {pr_number: $pr_number, branch: $branch, fix_iter: $fix_iter}}' | \
            gh api "repos/${REPO}/actions/workflows/ai-pr-review-respond.yml/dispatches" \
              --method POST --input -

      - name: Label PR and post actionable escalation after max iterations
        if: >-
          (steps.review.outputs.high_count != '0' || steps.review.outputs.critical_count != '0') &&
          steps.iter_check.outputs.iter_count >= 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create 'ai-review-needs-human' \
            --color 'b60205' \
            --description 'AI review found issues that could not be auto-fixed' \
            2>/dev/null || true
          gh pr edit "${PR_NUMBER}" --add-label 'ai-review-needs-human'

          LAST_REVIEW=$(gh pr view "${PR_NUMBER}" --json comments \
            --jq '[.comments[] | select(.author.login == "github-actions") | select(.body | test("\\*\\*Verdict:\\*\\*"))] | last | .body' \
            2>/dev/null || echo '')

          HIGH_SECTION=$(printf '%s' "${LAST_REVIEW}" | \
            sed -n '/^\*\*HIGH\|^### HIGH\|^## HIGH/,/^\*\*MEDIUM\|^### MEDIUM\|^## MEDIUM\|^---\|^### Verdict/p' | \
            head -c 3000 || echo '(could not extract findings)')

          cat <<ESCALATION_EOF | gh pr comment "${PR_NUMBER}" --body-file -
          🚨 **Auto-fix loop exhausted after 3 attempts — unresolved HIGH findings remain.**

          The AI fix agent attempted 3 times but could not fully resolve the review findings. The unresolved issues are likely structural rather than mechanical.

          **Remaining HIGH findings:**

          ${HIGH_SECTION}

          ---

          **To trigger another targeted fix attempt**, post this command as a comment:

          \`@ai Fix the remaining HIGH severity findings from the AI code review. Focus only on HIGH issues — read the last review comment for the full list.\`

          Or to address a specific finding, post a more targeted \`@ai\` instruction.
          ESCALATION_EOF
