name: Content Deploy

on:
  repository_dispatch:
    types: [content-update]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate environment
        env:
          DEPLOY_ENV: ${{ github.event.client_payload.environment }}
        run: |
          if [[ "$DEPLOY_ENV" != "staging" && "$DEPLOY_ENV" != "production" ]]; then
            echo "Invalid environment: '$DEPLOY_ENV'. Must be 'staging' or 'production'."
            exit 1
          fi

  deploy:
    needs: validate
    timeout-minutes: 30
    uses: ./.github/workflows/deploy-site.yml
    with:
      deployment_environment: ${{ github.event.client_payload.environment }}
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
