name: 'Deploy Site'

on:
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: 'Target environment'
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
  workflow_call:
    inputs:
      deployment_environment:
        description: 'Target environment'
        required: true
        type: string
    secrets:
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 'Build & Deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.deployment_environment }}

    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.4.0
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Build static site
        env:
          POSTS_BUCKET: ${{ vars.POSTS_S3_BUCKET }}
          POSTS_BUCKET_REGION: eu-west-2
          NEXT_PUBLIC_ENVIRONMENT: ${{ inputs.deployment_environment }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: pnpm build

      - name: Sync static files to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ''
          R2_ENDPOINT: https://${{ vars.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BLOG_R2_BUCKET: ${{ vars.BLOG_R2_BUCKET }}
        run: |
          # HTML — short-lived, must revalidate on each visit
          aws s3 sync out/ s3://${BLOG_R2_BUCKET}/ \
            --endpoint-url ${R2_ENDPOINT} \
            --region auto \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --delete

          # Next.js hashed chunks — immutable forever
          aws s3 sync out/ s3://${BLOG_R2_BUCKET}/ \
            --endpoint-url ${R2_ENDPOINT} \
            --region auto \
            --exclude "*" \
            --include "_next/static/**" \
            --cache-control "public, max-age=31536000, immutable"

          # Everything else (public/, manifests, etc.) — 1 day
          aws s3 sync out/ s3://${BLOG_R2_BUCKET}/ \
            --endpoint-url ${R2_ENDPOINT} \
            --region auto \
            --exclude "*.html" \
            --exclude "_next/static/**" \
            --cache-control "public, max-age=86400" \
            --delete

      - name: Sync site assets to assets CDN
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ''
          R2_ENDPOINT: https://${{ vars.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 sync out/assets/ s3://assets-jamesmiller-blog/assets/ \
            --endpoint-url ${R2_ENDPOINT} \
            --region auto \
            --cache-control "public, max-age=86400"

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Purges the entire zone — intentional for a personal blog where
          # simplicity outweighs the cost of also busting the assets CDN cache.
          curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
