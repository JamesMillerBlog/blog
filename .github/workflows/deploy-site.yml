name: 'Deploy Site'

on:
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: 'Target environment'
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      ref:
        description: 'Git ref to deploy (tag, branch, or SHA). Defaults to main.'
        required: false
        default: 'main'
        type: string
  workflow_call:
    inputs:
      deployment_environment:
        description: 'Target environment'
        required: true
        type: string
    secrets:
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 'Build & Deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.deployment_environment }}

    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Validate ref input
        if: inputs.ref != ''
        env:
          REF: ${{ inputs.ref }}
        run: |
          if [[ "$REF" =~ \.\. ]] || [[ "$REF" =~ ^- ]] || [[ "$REF" =~ [[:space:]] ]]; then
            echo "Invalid ref: '$REF'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Build static site
        env:
          POSTS_BUCKET: ${{ vars.POSTS_S3_BUCKET }}
          POSTS_BUCKET_REGION: eu-west-2
          NEXT_PUBLIC_ENVIRONMENT: ${{ inputs.deployment_environment }}
        run: pnpm build

      - name: Sync static files to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BLOG_R2_BUCKET: ${{ vars.BLOG_R2_BUCKET }}
        run: |
          # HTML — short-lived, must revalidate on each visit
          aws s3 sync out/ s3://${BLOG_R2_BUCKET}/ \
            --endpoint-url ${R2_ENDPOINT} \
            --region auto \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --delete

          # Next.js hashed chunks — immutable forever
          aws s3 sync out/ s3://${BLOG_R2_BUCKET}/ \
            --endpoint-url ${R2_ENDPOINT} \
            --region auto \
            --exclude "*" \
            --include "_next/static/**" \
            --cache-control "public, max-age=31536000, immutable"

          # Everything else (public/, manifests, etc.) — 1 day
          aws s3 sync out/ s3://${BLOG_R2_BUCKET}/ \
            --endpoint-url ${R2_ENDPOINT} \
            --region auto \
            --exclude "*.html" \
            --exclude "_next/static/**" \
            --cache-control "public, max-age=86400" \
            --delete

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Purges the entire zone — intentional for a personal blog where
          # simplicity outweighs the cost of also busting the assets CDN cache.
          curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
