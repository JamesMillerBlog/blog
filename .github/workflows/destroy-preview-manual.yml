name: Destroy Preview Environment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to destroy (leave empty to destroy ALL preview environments)'
        required: false
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: staging

    permissions:
      id-token: write
      contents: read
      deployments: write

    env:
      TF_VERSION: '1.9.5'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Discover PR numbers to destroy
        id: discover
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [[ -n "${INPUT_PR_NUMBER}" ]]; then
            if ! [[ "${INPUT_PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "Invalid PR number: ${INPUT_PR_NUMBER}"
              exit 1
            fi
            echo "Targeting single preview environment: PR #${INPUT_PR_NUMBER}"
            echo "pr_numbers=${INPUT_PR_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "No PR number given - discovering all preview environments from S3..."
            PR_NUMBERS=$(aws s3 ls "s3://${TF_STATE_BUCKET}/ephemeral/" \
              | grep -oE 'pr-[0-9]+' \
              | sed 's/pr-//' \
              | tr '\n' ' ' \
              | sed 's/[[:space:]]*$//')
            if [[ -z "${PR_NUMBERS}" ]]; then
              echo "No preview environments found in S3"
            else
              echo "Found environments for PRs: ${PR_NUMBERS}"
            fi
            echo "pr_numbers=${PR_NUMBERS}" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform - destroy preview environment(s)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          TF_VAR_basic_auth_username: ${{ secrets.BASIC_AUTH_USERNAME }}
          TF_VAR_basic_auth_password: ${{ secrets.BASIC_AUTH_PASSWORD }}
          PR_NUMBERS: ${{ steps.discover.outputs.pr_numbers }}
        working-directory: infrastructure/stacks/site/ephemeral
        run: |
          if [[ -z "${PR_NUMBERS}" ]]; then
            echo "Nothing to destroy."
            exit 0
          fi
          for PR_NUMBER in ${PR_NUMBERS}; do
            echo "=== Destroying preview for PR #${PR_NUMBER} ==="
            terraform init -reconfigure \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=ephemeral/pr-${PR_NUMBER}/terraform.tfstate" \
              -backend-config="region=eu-west-2"
            terraform destroy -auto-approve \
              -var="pr_number=${PR_NUMBER}" || \
              echo "Destroy for PR #${PR_NUMBER} failed or already gone - continuing"
          done

      - name: Mark GitHub deployments inactive
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBERS: ${{ steps.discover.outputs.pr_numbers }}
        run: |
          if [[ -z "${PR_NUMBERS}" ]]; then
            exit 0
          fi
          for PR_NUMBER in ${PR_NUMBERS}; do
            DEPLOY_ID=$(gh api "repos/${{ github.repository }}/deployments" \
              --method GET \
              -F environment="preview-pr-${PR_NUMBER}" \
              --jq '.[0].id' 2>/dev/null || echo "")
            if [[ -n "$DEPLOY_ID" && "$DEPLOY_ID" != "null" ]]; then
              gh api "repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses" \
                --method POST \
                -f state="inactive" \
                -f description="Preview environment destroyed" || true
            fi
          done
