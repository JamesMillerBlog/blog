name: "Infrastructure Deployment"

on:
  workflow_dispatch:
    inputs:
      staging:
        description: "Apply staging"
        type: boolean
        default: false
      production:
        description: "Apply production"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TERRAMATE_VERSION: "0.17.0"
  TF_VERSION: "1.9.5"

jobs:
  fmt:
    name: "Terraform Format & Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terramate
        run: |
          curl -fsSL "https://github.com/terramate-io/terramate/releases/download/v${TERRAMATE_VERSION}/terramate_${TERRAMATE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin terramate

      - name: Terramate Generate Check
        working-directory: ./infrastructure
        run: terramate generate --check

      - name: Terraform Format
        working-directory: ./infrastructure
        run: terramate run -- terraform fmt -check

      - name: Terraform Init (validate-only)
        working-directory: ./infrastructure
        run: terramate run -- terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./infrastructure
        run: terramate run -- terraform validate

  shared:
    name: "Terraform Shared"
    runs-on: ubuntu-latest
    environment: production
    needs: fmt

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terramate
        run: |
          curl -fsSL "https://github.com/terramate-io/terramate/releases/download/v${TERRAMATE_VERSION}/terramate_${TERRAMATE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin terramate

      - name: Terramate Generate
        working-directory: ./infrastructure
        run: terramate generate

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        working-directory: ./infrastructure/stacks/shared
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}"

      - name: Terraform Plan
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_content_github_repo: ${{ secrets.CONTENT_GITHUB_REPO }}
        working-directory: ./infrastructure/stacks/shared
        run: terraform plan -input=false -var-file=../../vars/shared/shared.tfvars -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_content_github_repo: ${{ secrets.CONTENT_GITHUB_REPO }}
        working-directory: ./infrastructure/stacks/shared
        run: terraform apply -auto-approve tfplan

  staging:
    name: "Terraform Site (staging)"
    runs-on: ubuntu-latest
    environment: staging
    needs: shared
    if: inputs.staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terramate
        run: |
          curl -fsSL "https://github.com/terramate-io/terramate/releases/download/v${TERRAMATE_VERSION}/terramate_${TERRAMATE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin terramate

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        working-directory: ./infrastructure/stacks/site/staging
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}"

      - name: Terraform Plan
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
        working-directory: ./infrastructure/stacks/site/staging
        run: terraform plan -input=false -var="state_bucket=${TF_STATE_BUCKET}" -var="basic_auth_username=${BASIC_AUTH_USERNAME}" -var="basic_auth_password=${BASIC_AUTH_PASSWORD}" -var-file=../../../vars/site/staging.tfvars -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
        working-directory: ./infrastructure/stacks/site/staging
        run: terraform apply -auto-approve tfplan

  production:
    name: "Terraform Site (production)"
    runs-on: ubuntu-latest
    environment: production
    needs: shared
    if: inputs.production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terramate
        run: |
          curl -fsSL "https://github.com/terramate-io/terramate/releases/download/v${TERRAMATE_VERSION}/terramate_${TERRAMATE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin terramate

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        working-directory: ./infrastructure/stacks/site/production
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}"

      - name: Terraform Plan
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        working-directory: ./infrastructure/stacks/site/production
        run: terraform plan -input=false -var="state_bucket=${TF_STATE_BUCKET}" -var-file=../../../vars/site/production.tfvars -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        working-directory: ./infrastructure/stacks/site/production
        run: terraform apply -auto-approve tfplan
