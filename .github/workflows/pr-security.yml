name: 'PR Security'

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-security-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: 'Dependency Audit'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for critical CVEs
        run: pnpm audit --audit-level=critical

  secret-scan:
    name: 'Secret Scan'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sL 'https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz' | \
            tar -xz -C /usr/local/bin gitleaks

      - name: Scan commits in this PR
        run: |
          gitleaks detect \
            --no-banner \
            --redact \
            --source . \
            --log-opts='origin/${{ github.base_ref }}..HEAD'
