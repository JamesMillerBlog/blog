name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    name: 'Tag & Publish Release'
    # Only runs when a PR labelled 'release' is merged
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          fetch-depth: 0

      - name: Extract tag from CHANGELOG.md
        id: version
        run: |
          # The top entry in CHANGELOG.md is always the release being published
          TAG=$(grep -m 1 '^## v' CHANGELOG.md | awk '{print $2}')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create git tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Extract lines between the tag header and the next --- separator
          ESCAPED_TAG=$(printf '%s' "${TAG}" | sed 's/\./\\./g')
          NOTES=$(awk "/^## ${ESCAPED_TAG}/{found=1; next} found && /^---/{exit} found" CHANGELOG.md | sed '/^[[:space:]]*$/d')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${NOTES}"
