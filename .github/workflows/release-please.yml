name: Release Please

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log release
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: echo "Released $TAG_NAME"

      # TODO: Add AWS deployment trigger here
      # e.g. trigger the deploy workflow via workflow_dispatch
      # When adding deployment steps, pin action SHAs to full commit hashes:
      #   googleapis/release-please-action@<sha>
      #   actions/checkout@<sha>
