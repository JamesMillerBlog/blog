name: 'Weekly Security Audit'

on:
  schedule:
    # Saturday 06:00 UTC — catch new CVEs early weekend
    - cron: '0 6 * * 6'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: security-audit-main
  cancel-in-progress: true

jobs:
  audit:
    name: 'Security Audit'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: 10
          run_install: false

      - name: Restore pnpm store
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        id: audit
        continue-on-error: true
        run: bash scripts/security-audit-run.sh
        env:
          CI: 'true'
          FIX_MODE: 'false'

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@69d79ce213269bbf6b7fe2e6e55f02baa2396be4 # v4.7.1
        with:
          name: security-audit-report
          path: |
            audit-report.md
            audit-report.json

      - name: Create ai-implement issue
        if: always() && (steps.audit.outputs.has_fixes == 'true' || steps.audit.outputs.has_warnings == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date +%Y-%m-%d)

          # Build body in a file so tool output is never evaluated as shell code
          BODY_FILE=$(mktemp)
          {
            printf '## Security Audit Findings — %s\n\n' "$TODAY"
            printf 'The weekly automated security audit found issues that require attention. Please review each finding and implement the appropriate fixes.\n\n'
            printf '### What to do\n\n'
            printf 'For each finding below:\n'
            printf -- '- **Dependency vulnerabilities**: bump the affected packages in `web/package.json` to a patched version and update `pnpm-lock.yaml`\n'
            printf -- '- **SAST findings**: fix the code pattern at the location mentioned\n'
            printf -- '- **Dockerfile misconfigurations**: update the relevant `Dockerfile.*`\n'
            printf -- '- **Terraform issues**: update the relevant `.tf` files under `infrastructure/`\n'
            printf -- '- **GitHub Actions issues**: update the workflow files in `.github/workflows/`\n\n'
            printf 'Only make changes that are clearly safe and correct. If a finding is a false positive, add a comment in the code explaining why it can be ignored and do not change the code.\n\n'
            printf '### Audit Report\n\n'
            printf '<details>\n<summary>Full report</summary>\n\n```\n'
            cat audit-report.md 2>/dev/null || printf 'Report not available.'
            printf '\n```\n\n</details>\n\n'
            cat audit-warnings.md 2>/dev/null || true
            printf '\n[View CI run for full tool output](%s/%s/actions/runs/%s)\n' \
              "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
          } > "$BODY_FILE"

          ISSUE_NUMBER=$(gh issue create \
            --title "🔒 Security audit findings — ${TODAY}" \
            --label 'security' \
            --body-file "$BODY_FILE" \
            --json number --jq '.number')

          # Apply ai-implement label after security label is already on the issue
          # so ai-issue.yml sees both labels when it triggers
          gh issue edit "$ISSUE_NUMBER" --add-label 'ai-implement'

          echo "Created issue #$ISSUE_NUMBER"
