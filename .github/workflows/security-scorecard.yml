name: "OSSF Scorecard"

on:
  schedule:
    # Weekly on Saturday at 07:00 UTC
    - cron: "0 7 * * 6"
  # Run on push to main to keep scorecard badge updated
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    name: "Scorecard Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      # Needed for Code scanning upload
      security-events: write
      # Needed for publishing results to OSSF REST API
      id-token: write
      # Needed for branch protection checks
      checks: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: scorecard-results.json
          results_format: json
          publish_results: true
          # Publish to OSSF Scorecard REST API for badge generation
          # Requires id-token: write

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@fc7e4a0fa01c3cca5fd6a1fddec5c0740c977aa2 # v3.28.14
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
