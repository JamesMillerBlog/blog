services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile.claude
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - ${HOME}/.claude:/home/claude/.claude
      - ${HOME}/.claude.json:/home/claude/.claude.json
      - ${HOME}/.config/gh:/home/claude/.config/gh
    environment:
      - ANTHROPIC_MODEL=claude-sonnet-4-6
      - GH_TOKEN=${GH_TOKEN:-}

  pi:
    build:
      context: .
      dockerfile: Dockerfile.pi
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - ${HOME}/.pi:/home/pi/.pi
      - ${HOME}/.config/gh:/home/pi/.config/gh
    environment:
      - GH_TOKEN=${GH_TOKEN:-}
