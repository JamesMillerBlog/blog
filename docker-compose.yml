services:
  claude:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - ${HOME}/.claude:/home/claude/.claude
      - ${HOME}/.claude.json:/home/claude/.claude.json
    environment:
      - ANTHROPIC_MODEL=claude-sonnet-4-6
      - NTFY_TOPIC=${NTFY_TOPIC}
    command: --dangerously-skip-permissions
